name: Deploy

on:
  push:
    branches: [master]

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        package: [server, worker, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/${{ matrix.package }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.package }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.package }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_KEY=${{ matrix.package == 'frontend' && secrets.VITE_API_KEY || '' }}

  deploy-ecs:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Force redeploy ECS services
        run: |
          for service in stt-summary-server stt-summary-worker stt-summary-frontend; do
            aws ecs update-service \
              --cluster stt-summary-cluster \
              --service "$service" \
              --force-new-deployment \
              --query 'service.serviceName' \
              --output text
            echo "Redeployed: $service"
          done
